name: 更新 Cloudflare 优选 IP 到腾讯云 DNS

on:
  #schedule:
    #- cron: '10 * * * *'
  workflow_dispatch:      # 允许手动触发

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install --upgrade tencentcloud-sdk-python
          # ipaddress 是 Python 标准库，无需额外安装

      - name: Install Cloudflare WARP
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg lsb-release wireguard
          LATEST_WGCF=$(curl -s https://api.github.com/repos/ViRb3/wgcf/releases/latest | grep "browser_download_url.*linux_amd64" | cut -d '"' -f 4)
          curl -fsSL $LATEST_WGCF -o wgcf
          sudo mv wgcf /usr/local/bin/wgcf
          sudo chmod +x /usr/local/bin/wgcf
          echo | wgcf register --accept-tos
          wgcf generate
          sed -i '/^AllowedIPs/c\AllowedIPs = ::/0' wgcf-profile.conf
          sed -i 's/^Endpoint = .*/Endpoint = 162.159.192.1:2408/' wgcf-profile.conf
          grep -E '^(AllowedIPs|Endpoint)' wgcf-profile.conf
          sudo mv wgcf-profile.conf /etc/wireguard/warp.conf
          sudo wg-quick up warp
          echo "=== IPv4 (should be runner's original IP) ==="
          curl -4 --max-time 10 https://ipv4.icanhazip.com
          echo "=== IPv6 (should show WARP IPv6 address) ==="
          curl -6 --max-time 10 https://ipv6.icanhazip.com
          echo "=== WireGuard status ==="
          sudo wg show

      - name: 执行 IP 生成与 DNS 更新
        env:
          # 必需：腾讯云密钥和域名
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          DOMAIN: ${{ secrets.DOMAIN }}

          # 可选：主机记录，默认为 @
          RECORD_NAME: ${{ secrets.RECORD_NAME || '@' }}

          # IP 数量配置（脚本中已设默认值，可根据需要覆盖）
          #ISP_IP_COUNT: ${{ secrets.ISP_IP_COUNT }}
          #DEFAULT_IP_COUNT: ${{ secrets.DEFAULT_IP_COUNT }}
          #GENERATE_IPV6: ${{ secrets.GENERATE_IPV6 }}
          #ISP_IP_COUNT_V6: ${{ secrets.ISP_IP_COUNT_V6 }}
          #DEFAULT_IP_COUNT_V6: ${{ secrets.DEFAULT_IP_COUNT_V6 }}

          # IP 测试配置（脚本中已设默认值）
          #TEST_URL_TEMPLATE: ${{ secrets.TEST_URL_TEMPLATE }}
          #EXPECTED_STATUS_CODE: ${{ secrets.EXPECTED_STATUS_CODE }}
          #REQUEST_TIMEOUT: ${{ secrets.REQUEST_TIMEOUT }}
          #MAX_WORKERS: ${{ secrets.MAX_WORKERS }}
          #MAX_RETRY_ATTEMPTS: ${{ secrets.MAX_RETRY_ATTEMPTS }}

          # Telegram 通知（可选）
          TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }}

        run: python -u dnspod-random.py
  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: leung7963/gh-workflow-keepalive@main